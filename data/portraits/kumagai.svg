  <path d="M100,183 Q120,200 140,183 Q120,196 100,183 Z" fill="#7a3226"/>
  <path d="M104,185 Q120,193 136,185" fill="none" stroke="#f2e6dc" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M100,183 Q120,199 140,183" fill="none" stroke="#8a4a34" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <!-- 服: シャツ(ノーネクタイ、第一ボタンを開けた前開き) -->
  <path d="M28,320 C34,236 70,207 100,209 C110,220 130,220 140,209 C170,207 206,236 212,320 Z" fill="#3f5468"/>
  <path d="M100,209 L120,234 L140,209 L132,250 L120,262 L108,250 Z" fill="#8b97a0"/>
  <path d="M100,209 L112,226 L100,236" fill="none" stroke="#2b3946" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M140,209 L128,226 L140,236" fill="none" stroke="#2b3946" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="120" cy="252" r="2.6" fill="#2b3946" opacity="0.8"/>
  <!-- リムライト -->
  <path d="M168,118 Q176,152 166,192" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
</svg>
