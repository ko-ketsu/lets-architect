  <!-- 短髪(がっしり、こめかみに白髪交じり) -->
  <path d="M120,58 C86,58 68,82 68,113 C67,127 69,140 75,151 L89,147 C87,139 86,127 87,115 C93,105 105,101 120,101 C135,101 147,105 153,115 C154,127 153,139 151,147 L165,151 C171,140 173,127 172,113 C172,82 154,58 120,58 Z" fill="#2b2320"/>
  <path d="M96,72 Q120,60 144,72" fill="none" stroke="#3a322d" stroke-width="2.4" stroke-linecap="round" opacity="0.6"/>
  <path d="M78,120 C77,128 78,136 81,144" fill="none" stroke="#8a8580" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
  <path d="M162,120 C163,128 162,136 159,144" fill="none" stroke="#8a8580" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
