<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" role="img" aria-label="熊谷剛(社内新規事業部長)の立ち絵">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#182238"/><stop offset="1" stop-color="#0e1520"/>
    </linearGradient>
    <radialGradient id="phalo" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.09"/>
      <stop offset="0.55" stop-color="#22d3ee" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="240" height="320" fill="url(#pbg)"/>
  <rect width="240" height="320" fill="url(#phalo)"/>
  <!-- 耳(大きめ、がっしり) -->
  <ellipse cx="76" cy="151" rx="8" ry="12" fill="#d9a878"/>
  <ellipse cx="164" cy="151" rx="8" ry="12" fill="#d9a878"/>
  <!-- 首(太め・襟の奥まで伸ばして隙間を作らない) -->
  <path d="M99,160 L99,225 C99,236 108,244 120,244 C132,244 141,236 141,225 L141,160 Z" fill="#d9a878"/>
  <path d="M99,170 C106,188 134,188 141,170 L141,192 C132,201 108,201 99,192 Z" fill="#b8865c"/>
  <!-- 顔(卵型・幅広でがっしり) -->
