  <path d="M85,132 Q100,124 116,131" fill="none" stroke="#2b2320" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M155,132 Q140,124 124,131" fill="none" stroke="#2b2320" stroke-width="5.5" stroke-linecap="round"/>
  <!-- 目(人なつっこく大きめの笑い目、まぶたは瞳に接する細ライン) -->
  <path d="M90,147 Q100,142 112,146" fill="none" stroke="#2a1d16" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M150,147 Q140,142 128,146" fill="none" stroke="#2a1d16" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="101" cy="148" r="4.6" fill="#2a1d16"/>
  <circle cx="139" cy="148" r="4.6" fill="#2a1d16"/>
  <circle cx="99.4" cy="146.2" r="1.4" fill="#ffffff" opacity="0.9"/>
  <circle cx="137.4" cy="146.2" r="1.4" fill="#ffffff" opacity="0.9"/>
  <!-- 頬・目尻の笑いじわ -->
  <path d="M84,152 Q80,148 78,142" fill="none" stroke="#b8865c" stroke-width="1.6" opacity="0.5" stroke-linecap="round"/>
  <path d="M156,152 Q160,148 162,142" fill="none" stroke="#b8865c" stroke-width="1.6" opacity="0.5" stroke-linecap="round"/>
  <ellipse cx="88" cy="167" rx="9" ry="5" fill="#e07a5a" opacity="0.18"/>
  <ellipse cx="152" cy="167" rx="9" ry="5" fill="#e07a5a" opacity="0.18"/>
  <!-- 鼻(丸めで大きめ) -->
  <path d="M120,152 C119,160 116,166 112,169 C116,172 125,172 129,169" fill="none" stroke="#b8865c" stroke-width="2.6" stroke-linecap="round"/>
