<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 544" role="img" aria-label="配送ステータスAPI(status・location・eta を提供)の呼び出し元4システム(倉庫システム・請求書システム・委託先配送業者システム・モバイル配送アプリ)と、それぞれが参照しているフィールドを示す依存図">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9aa8bf"/>
    </marker>
  </defs>

  <rect width="640" height="544" fill="#0f1626"/>
  <text x="320" y="30" text-anchor="middle" fill="#e9eef6" font-size="20" font-weight="bold">現状の依存関係: 配送ステータスAPIの呼び出し元</text>

  <!-- central API box -->
  <rect x="205" y="234" width="230" height="118" rx="10" fill="#1a2334" stroke="#67e8f9" stroke-width="2.5"/>
  <text x="320" y="260" text-anchor="middle" fill="#e9eef6" font-size="17" font-weight="bold">配送ステータスAPI</text>
  <line x1="219" y1="270" x2="421" y2="270" stroke="#2a3549" stroke-width="1.5"/>
  <text x="225" y="296" fill="#e9eef6" font-size="15">status: string</text>
  <text x="225" y="326" fill="#9aa8bf" font-size="14">location / eta</text>

  <!-- 倉庫システム -->
  <rect x="30" y="60" width="200" height="88" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="130" y="88" text-anchor="middle" fill="#e9eef6" font-size="16" font-weight="bold">倉庫システム</text>
  <text x="130" y="112" text-anchor="middle" fill="#9aa8bf" font-size="14">status を参照</text>
  <text x="130" y="132" text-anchor="middle" fill="#9aa8bf" font-size="13">(社内・即改修可)</text>

  <!-- 請求書システム -->
  <rect x="410" y="60" width="200" height="88" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="510" y="88" text-anchor="middle" fill="#e9eef6" font-size="16" font-weight="bold">請求書システム</text>
  <text x="510" y="112" text-anchor="middle" fill="#9aa8bf" font-size="14">status を参照</text>
  <text x="510" y="132" text-anchor="middle" fill="#9aa8bf" font-size="13">(社内・即改修可)</text>

  <!-- 委託先配送業者システム -->
  <rect x="16" y="420" width="230" height="108" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="131" y="448" text-anchor="middle" fill="#e9eef6" font-size="16" font-weight="bold">委託先配送業者</text>
  <text x="131" y="448" text-anchor="middle" fill="#e9eef6" font-size="16" font-weight="bold" dy="18">システム</text>
  <text x="131" y="490" text-anchor="middle" fill="#9aa8bf" font-size="14">status を参照</text>
  <text x="131" y="514" text-anchor="middle" fill="#9aa8bf" font-size="13">(社外・改修には契約と調整が必要)</text>

  <!-- モバイル配送アプリ -->
  <rect x="400" y="420" width="220" height="96" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="510" y="448" text-anchor="middle" fill="#e9eef6" font-size="16" font-weight="bold">モバイル配送アプリ</text>
  <text x="510" y="472" text-anchor="middle" fill="#9aa8bf" font-size="14">location / eta を参照</text>
  <text x="510" y="494" text-anchor="middle" fill="#9aa8bf" font-size="13">(status は未使用)</text>

  <!-- arrows -->
  <line x1="180" y1="148" x2="255" y2="234" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="148" x2="385" y2="234" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="180" y1="420" x2="255" y2="352" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="420" x2="385" y2="352" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
