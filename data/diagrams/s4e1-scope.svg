<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-label="7つの機能について見積工数(人日)と現在の進捗を一覧にした表。受注入力画面刷新20人日進行中、在庫連携バッチ15人日進行中、帳票出力10人日未着手、旧受発注データ移行25人日未着手、得意先別価格マスタ12人日完了、権限管理画面8人日未着手、ダッシュボード10人日未着手と記載されている">
  <rect width="900" height="480" fill="#0f1626"/>
  <text x="450" y="34" text-anchor="middle" fill="#e9eef6" font-size="20" font-weight="bold">ツバキ文具 販売管理システム刷新: 機能一覧・見積工数・進捗</text>

  <!-- table header -->
  <rect x="40" y="60" width="820" height="36" fill="#1a2334" stroke="#2a3549" stroke-width="1.5"/>
  <text x="60" y="84" fill="#9aa8bf" font-size="14" font-weight="bold">機能</text>
  <text x="520" y="84" fill="#9aa8bf" font-size="14" font-weight="bold">見積工数</text>
  <text x="680" y="84" fill="#9aa8bf" font-size="14" font-weight="bold">現在の進捗</text>

  <!-- rows -->
  <g font-size="14" fill="#e9eef6">
    <rect x="40" y="96" width="820" height="54" fill="#141c2c" stroke="#232f45" stroke-width="1"/>
    <text x="60" y="129" >受注入力画面刷新</text>
    <text x="520" y="129">20人日</text>
    <text x="680" y="129">進行中(約6割)</text>

    <rect x="40" y="150" width="820" height="54" fill="#0f1626" stroke="#232f45" stroke-width="1"/>
    <text x="60" y="183">在庫連携バッチ</text>
    <text x="520" y="183">15人日</text>
    <text x="680" y="183">進行中(約3割)</text>

    <rect x="40" y="204" width="820" height="54" fill="#141c2c" stroke="#232f45" stroke-width="1"/>
    <text x="60" y="237">帳票出力(納品書・請求書)</text>
    <text x="520" y="237">10人日</text>
    <text x="680" y="237">未着手</text>

    <rect x="40" y="258" width="820" height="54" fill="#0f1626" stroke="#232f45" stroke-width="1"/>
    <text x="60" y="291">旧受発注データ移行</text>
    <text x="520" y="291">25人日</text>
    <text x="680" y="291">未着手</text>

    <rect x="40" y="312" width="820" height="54" fill="#141c2c" stroke="#232f45" stroke-width="1"/>
    <text x="60" y="345">得意先別価格マスタ</text>
    <text x="520" y="345">12人日</text>
    <text x="680" y="345">完了</text>

    <rect x="40" y="366" width="820" height="54" fill="#0f1626" stroke="#232f45" stroke-width="1"/>
    <text x="60" y="399">権限管理画面</text>
    <text x="520" y="399">8人日</text>
    <text x="680" y="399">未着手</text>

    <rect x="40" y="420" width="820" height="54" fill="#141c2c" stroke="#232f45" stroke-width="1"/>
    <text x="60" y="453">ダッシュボード(売上サマリ)</text>
    <text x="520" y="453">10人日</text>
    <text x="680" y="453">未着手</text>
  </g>
</svg>
