<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-label="クライアントからCDN・APIゲートウェイ・アプリサーバー(3台)・キャッシュ(1台)・DBへと至る構成図。エッジ通過後のピーク実測が2,000req/s、キャッシュのヒット率実測が90%と記載されている">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9aa8bf"/>
    </marker>
  </defs>

  <rect width="980" height="420" fill="#0f1626"/>
  <text x="490" y="34" text-anchor="middle" fill="#e9eef6" font-size="20" font-weight="bold">シートピア: 現状のたたき台構成</text>

  <!-- Client -->
  <rect x="20" y="130" width="120" height="90" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="80" y="168" text-anchor="middle" fill="#e9eef6" font-size="15" font-weight="bold">クライアント</text>
  <text x="80" y="192" text-anchor="middle" fill="#9aa8bf" font-size="12">(お客様の端末)</text>

  <!-- CDN -->
  <rect x="180" y="130" width="120" height="90" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="240" y="164" text-anchor="middle" fill="#e9eef6" font-size="15" font-weight="bold">CDN</text>
  <text x="240" y="186" text-anchor="middle" fill="#9aa8bf" font-size="12">静的アセット</text>
  <text x="240" y="204" text-anchor="middle" fill="#9aa8bf" font-size="12">(画像・CSS)を配信</text>

  <!-- Gateway -->
  <rect x="340" y="130" width="150" height="90" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="415" y="164" text-anchor="middle" fill="#e9eef6" font-size="15" font-weight="bold">APIゲートウェイ</text>
  <text x="415" y="186" text-anchor="middle" fill="#9aa8bf" font-size="12">認証・レートリミットを</text>
  <text x="415" y="204" text-anchor="middle" fill="#9aa8bf" font-size="12">集約</text>

  <!-- App servers -->
  <rect x="530" y="130" width="150" height="90" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="605" y="164" text-anchor="middle" fill="#e9eef6" font-size="15" font-weight="bold">アプリサーバー</text>
  <text x="605" y="186" text-anchor="middle" fill="#9aa8bf" font-size="12">3台構成</text>

  <!-- Cache -->
  <rect x="720" y="130" width="110" height="90" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="775" y="164" text-anchor="middle" fill="#e9eef6" font-size="15" font-weight="bold">キャッシュ</text>
  <text x="775" y="186" text-anchor="middle" fill="#9aa8bf" font-size="12">1台構成</text>
  <text x="775" y="204" text-anchor="middle" fill="#9aa8bf" font-size="11">(座席空き状況など)</text>

  <!-- DB -->
  <rect x="870" y="130" width="90" height="90" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="915" y="164" text-anchor="middle" fill="#e9eef6" font-size="15" font-weight="bold">DB</text>
  <text x="915" y="186" text-anchor="middle" fill="#9aa8bf" font-size="11">座席・会員・</text>
  <text x="915" y="202" text-anchor="middle" fill="#9aa8bf" font-size="11">決済データ</text>

  <!-- arrows -->
  <line x1="140" y1="175" x2="178" y2="175" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="300" y1="175" x2="338" y2="175" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="490" y1="175" x2="528" y2="175" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="680" y1="175" x2="718" y2="175" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="830" y1="175" x2="868" y2="175" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- measured facts -->
  <rect x="180" y="270" width="330" height="70" rx="8" fill="#141c2c" stroke="#2a3549" stroke-width="1.5"/>
  <text x="345" y="296" text-anchor="middle" fill="#e9eef6" font-size="14" font-weight="bold">エッジ通過後 ピーク実測</text>
  <text x="345" y="318" text-anchor="middle" fill="#9aa8bf" font-size="13">(直近の大型先行販売時): 2,000 req/s</text>

  <rect x="540" y="270" width="330" height="70" rx="8" fill="#141c2c" stroke="#2a3549" stroke-width="1.5"/>
  <text x="705" y="296" text-anchor="middle" fill="#e9eef6" font-size="14" font-weight="bold">キャッシュ ヒット率実測</text>
  <text x="705" y="318" text-anchor="middle" fill="#9aa8bf" font-size="13">(直近1週間平均): 90%</text>
</svg>
