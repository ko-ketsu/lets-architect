<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 348" role="img" aria-label="商品一覧を1回取得した後、商品20件それぞれについて価格取得APIと在庫取得APIを個別に呼び出しているシーケンス図">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9aa8bf"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#67e8f9"/>
    </marker>
  </defs>

  <rect width="640" height="348" fill="#0f1626"/>
  <text x="320" y="30" text-anchor="middle" fill="#e9eef6" font-size="20" font-weight="bold">実際の通信ログ: 商品一覧20件を表示するとき</text>

  <!-- actor headers -->
  <rect x="70" y="42" width="160" height="40" rx="8" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="150" y="67" text-anchor="middle" fill="#e9eef6" font-size="16" font-weight="bold">コネクタ側アプリ</text>
  <rect x="410" y="42" width="180" height="40" rx="8" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="500" y="67" text-anchor="middle" fill="#e9eef6" font-size="16" font-weight="bold">公開API(現状)</text>

  <!-- lifelines -->
  <line x1="150" y1="82" x2="150" y2="330" stroke="#2a3549" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="500" y1="82" x2="500" y2="330" stroke="#2a3549" stroke-width="2" stroke-dasharray="5,4"/>

  <!-- initial list call -->
  <text x="325" y="100" text-anchor="middle" fill="#67e8f9" font-size="14">① GET /products(一覧)</text>
  <line x1="150" y1="108" x2="500" y2="108" stroke="#67e8f9" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <text x="325" y="128" text-anchor="middle" fill="#9aa8bf" font-size="14">200 OK: 商品ID 20件</text>
  <line x1="500" y1="136" x2="150" y2="136" stroke="#9aa8bf" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>

  <!-- loop frame -->
  <rect x="108" y="156" width="410" height="140" rx="8" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="7,5"/>
  <text x="124" y="176" fill="#f59e0b" font-size="14" font-weight="bold">loop ×20(商品1件ごとに繰り返す)</text>

  <text x="325" y="200" text-anchor="middle" fill="#e9eef6" font-size="13">② GET /products/{id}/price</text>
  <line x1="150" y1="207" x2="500" y2="207" stroke="#9aa8bf" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="325" y="223" text-anchor="middle" fill="#9aa8bf" font-size="13">200 OK: price</text>
  <line x1="500" y1="230" x2="150" y2="230" stroke="#6b7690" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow)"/>

  <text x="325" y="253" text-anchor="middle" fill="#e9eef6" font-size="13">③ GET /products/{id}/stock</text>
  <line x1="150" y1="260" x2="500" y2="260" stroke="#9aa8bf" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="325" y="276" text-anchor="middle" fill="#9aa8bf" font-size="13">200 OK: stock</text>
  <line x1="500" y1="283" x2="150" y2="283" stroke="#6b7690" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow)"/>

  <text x="325" y="330" text-anchor="middle" fill="#6b7690" font-size="14">… 同じやり取りを商品20件ぶん繰り返す …</text>
</svg>
