<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 400" role="img" aria-label="クライアントからロードバランサー・アプリサーバー(2台)・キャッシュ(1台)・DB(1台)へと至る構成図。別系統として、レビュー・クーポンの非同期バッチ処理がDBに書き込みを行っている">
  <defs>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9aa8bf"/>
    </marker>
  </defs>
  <rect width="980" height="400" fill="#0f1626"/>
  <text x="490" y="34" text-anchor="middle" fill="#e9eef6" font-size="20" font-weight="bold">フルフルマーケット: 現在のシステム構成</text>

  <!-- Client -->
  <rect x="30" y="140" width="120" height="90" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="90" y="180" text-anchor="middle" fill="#e9eef6" font-size="15" font-weight="bold">クライアント</text>
  <text x="90" y="202" text-anchor="middle" fill="#9aa8bf" font-size="12">(お客様の端末)</text>

  <!-- LB -->
  <rect x="200" y="140" width="130" height="90" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="265" y="180" text-anchor="middle" fill="#e9eef6" font-size="15" font-weight="bold">ロードバランサー</text>
  <text x="265" y="202" text-anchor="middle" fill="#9aa8bf" font-size="12">1台構成</text>

  <!-- App servers -->
  <rect x="380" y="140" width="150" height="90" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="455" y="180" text-anchor="middle" fill="#e9eef6" font-size="15" font-weight="bold">アプリサーバー</text>
  <text x="455" y="202" text-anchor="middle" fill="#9aa8bf" font-size="12">2台構成</text>
  <text x="455" y="220" text-anchor="middle" fill="#9aa8bf" font-size="11">(閲覧・決済・レビュー・クーポン)</text>

  <!-- Cache -->
  <rect x="580" y="140" width="120" height="90" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="640" y="180" text-anchor="middle" fill="#e9eef6" font-size="15" font-weight="bold">キャッシュ</text>
  <text x="640" y="202" text-anchor="middle" fill="#9aa8bf" font-size="12">1台構成</text>

  <!-- DB -->
  <rect x="750" y="140" width="120" height="90" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="810" y="180" text-anchor="middle" fill="#e9eef6" font-size="15" font-weight="bold">DB</text>
  <text x="810" y="202" text-anchor="middle" fill="#9aa8bf" font-size="11">商品・注文・決済・</text>
  <text x="810" y="218" text-anchor="middle" fill="#9aa8bf" font-size="11">レビューデータ</text>

  <!-- arrows main path -->
  <line x1="150" y1="185" x2="198" y2="185" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrowA)"/>
  <line x1="330" y1="185" x2="378" y2="185" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrowA)"/>
  <line x1="530" y1="185" x2="578" y2="185" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrowA)"/>
  <line x1="700" y1="185" x2="748" y2="185" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrowA)"/>

  <!-- batch system -->
  <rect x="380" y="290" width="230" height="70" rx="10" fill="#1a2334" stroke="#2a3549" stroke-width="2"/>
  <text x="495" y="320" text-anchor="middle" fill="#e9eef6" font-size="14" font-weight="bold">レビュー・クーポン</text>
  <text x="495" y="340" text-anchor="middle" fill="#9aa8bf" font-size="12">非同期バッチ処理</text>

  <line x1="495" y1="290" x2="495" y2="232" stroke="#9aa8bf" stroke-width="2"/>
  <line x1="610" y1="325" x2="805" y2="325" stroke="#9aa8bf" stroke-width="2"/>
  <line x1="805" y1="325" x2="805" y2="232" stroke="#9aa8bf" stroke-width="2" marker-end="url(#arrowA)"/>
</svg>
